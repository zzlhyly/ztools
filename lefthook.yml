pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,vue,css,json,md}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{ts,vue}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    cargo-fmt:
      glob: '*.rs'
      run: cargo fmt --manifest-path src-tauri/Cargo.toml
      stage_fixed: true
    cargo-clippy:
      glob: '*.rs'
      run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
